        body { background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card {

        .name-box {
            background: #f3e8ff;

            padding: 14px 20px;
            font-size: 15px;
            color: #7c3aed;
            font-weight: 700;
            margin-bottom: 28px;
        }
        .divider { font-size: 13px; color: #94a3b8; margin-bottom: 20px; }
        .wa-btn {

            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #25d366;
            color: #fff;
            font-size: 16px;
            font-weight: 800;
            padding: 16px 24px;
            border-radius: 14px;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(37,211,102,0.3);
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .wa-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(37,211,102,0.4); }
        .wa-btn svg { width: 24px; height: 24px; flex-shrink: 0; }
        .skip { font-size: 12px; color: #94a3b8; margin-top: 8px; }
        .skip a { color: #7c3aed; text-decoration: none; }
        .badge { display: inline-block; background: #fef9c3; color: #92400e; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 50px; margin-bottom: 16px; border: 1px solid #fde68a; }
